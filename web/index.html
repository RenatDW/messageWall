<!DOCTYPE html>
<html lang="ru">
  <head>
    <link rel="stylesheet" href="styles.css" />
    <script src="buttonHandler.js"></script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Доска сообщений</title>
  </head>
  <body>
    <header>
      <div class="header-content">
        <div class="header-left">
          <a href="/" class="home-link">Главная</a>
          <a href="/author" class="home-link">Об авторе</a>
        </div>
        <div class="header-right">
          <div class="text-controls">
            <button id="decreaseText">А-</button>
            <button id="increaseText">А+</button>
          </div>
        </div>
      </div>
    </header>
    <div id="modalContainer"></div>
    <h1>Доска сообщений</h1>
    <div class="container">
      <h3>Ваше сообщение</h3>
      <span>
        <textarea id="messageInput" placeholder="Напишите сообщение"></textarea>
      </span>
      <button id="runScript">Отправить</button>
    </div>
    <div class="container message-board"></div>
  </body>
</html>
